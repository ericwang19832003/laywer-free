name: Monthly Court Data Refresh

on:
  schedule:
    # First day of every month at 9 AM UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run court data refresh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx apps/web/scripts/refresh-court-data.ts

      - name: Check for changes
        id: diff
        run: |
          if diff -q \
            packages/shared/src/courts/texas-filing-requirements.ts \
            packages/shared/src/courts/texas-filing-requirements.updated.ts \
            > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Apply updated file
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp packages/shared/src/courts/texas-filing-requirements.updated.ts \
             packages/shared/src/courts/texas-filing-requirements.ts
          rm -f packages/shared/src/courts/texas-filing-requirements.updated.ts

      - name: Open PR with proposed changes
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/court-data-refresh-${{ github.run_id }}
          commit-message: 'chore: monthly court filing requirements refresh'
          title: '[Monthly] Court filing requirements update'
          body: |
            ## Monthly Court Data Refresh

            DeepSeek has proposed updates to Texas county filing requirements.

            **Before merging, please:**
            - [ ] Spot-check Harris County fees against [hcdistrictclerk.com](https://www.hcdistrictclerk.com)
            - [ ] Spot-check Dallas County fees against [dallascounty.org](https://www.dallascounty.org/departments/districtclerk)
            - [ ] Spot-check Travis County fees against [traviscountytx.gov](https://www.traviscountytx.gov/district-clerk)
            - [ ] Verify no TypeScript errors: `cd packages/shared && npx tsc --noEmit`

            Auto-generated by the monthly court data refresh workflow.
          labels: 'data-maintenance,court-info'
          delete-branch: true
